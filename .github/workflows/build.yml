name: Build Bundles

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run build
        run: node build.js

      - name: Commit dist folders
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: rebuild bundles [skip ci]"
          file_pattern: dist*/**
